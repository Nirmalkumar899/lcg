<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | LCG Cinematic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Manrope:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />
    <style>
        :root {
            --bg: #ececf0;
            --s-light: #ffffff;
            --s-dark: #ccced6;
            --accent: #8eb32a;
            --accent-glow: rgba(142, 179, 42, 0.4);
            --accent-dark: #6e8c20;
        }

        body {
            background-color: var(--bg);
            font-family: 'Manrope', sans-serif;
            color: #222;
            margin: 0;
            /* overflow:hidden removed — mobile needs to scroll */
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Giant Background Branding */
        .bg-brand {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50vw;
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.015);
            z-index: -1;
            pointer-events: none;
            letter-spacing: -0.05em;
        }

        /* Neumorphic Typography but with Lime Color */
        .n-text {
            color: var(--accent);
            text-shadow:
                2px 2px 4px var(--s-dark),
                -1px -1px 2px var(--s-light),
                0 0 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* Navigation */
        .nav-link {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: #999;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #222;
        }

        /* Main Container */
        .main-container {
            height: 100vh;
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            padding: 0 6vw;
            align-items: center;
            gap: 40px;
        }

        /* Control Panel */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Improved Neumorphic Cards */
        .card {
            background: var(--bg);
            border-radius: 40px;
            box-shadow:
                16px 16px 32px var(--s-dark),
                -16px -16px 32px var(--s-light);
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow:
                24px 24px 48px var(--s-dark),
                -24px -24px 48px var(--s-light);
        }

        .card.sunken {
            box-shadow:
                inset 10px 10px 20px var(--s-dark),
                inset -10px -10px 20px var(--s-light);
            background: var(--bg);
        }

        .service-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-dark);
            text-align: center;
            line-height: 1.4;
            pointer-events: none;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        }

        .card-icon {
            font-size: 2.2rem;
            color: var(--accent);
            pointer-events: none;
            opacity: 1;
            filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.1));
        }

        /* Control Buttons */
        .btn-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .plus-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            box-shadow: 0 8px 16px var(--accent-glow);
            color: #000;
            margin-bottom: 20px;
        }

        .plus-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 24px var(--accent-glow);
        }

        .minus-btn {
            background: var(--bg);
            box-shadow:
                6px 6px 12px var(--s-dark),
                -6px -6px 12px var(--s-light);
            color: #888;
        }

        .minus-btn:hover {
            box-shadow:
                4px 4px 8px var(--s-dark),
                -4px -4px 8px var(--s-light);
            transform: scale(0.98);
        }

        /* Inset List Area */
        .inset-list {
            background: var(--bg);
            border-radius: 30px;
            box-shadow:
                inset 8px 8px 16px var(--s-dark),
                inset -8px -8px 16px var(--s-light);
            padding: 30px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .list-line {
            height: 8px;
            background: rgba(0, 0, 0, 0.035);
            border-radius: 10px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .line-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease;
            opacity: 0.1;
        }

        .line-fill.active {
            width: 100%;
            opacity: 0.3;
        }

        /* Grid Layer */
        .grid-mask {
            height: 80vh;
            overflow: hidden;
            padding: 40px 20px;
            margin: -40px -20px;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        .services-grid-inner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Responsive Styles */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 100px 6vw;
                height: auto;
                min-height: 100vh;
                gap: 40px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .controls {
                width: 100%;
                gap: 30px;
            }

            .inset-list {
                width: 100%;
                max-width: 320px;
                margin: 0 auto;
            }

            .grid-mask {
                height: 500px;
                width: 100%;
                margin: 0;
            }
        }

        /* ─────────────────────────────────────────────────────
           PREMIUM MOBILE LAYOUT (768px and below) — Services
        ───────────────────────────────────────────────────── */
        @media (max-width: 768px) {

            /* Allow vertical scroll, clip horizontal only */
            body { overflow-y: auto; overflow-x: hidden; }

            /* Main layout: vertical flex column, perfectly padded */
            .main-container {
                height: auto;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 70px 16px 80px;
                gap: 0;
                overflow: visible;
            }

            /* Controls block: centered, tight */
            .controls {
                width: 100%;
                gap: 0;
                align-items: center;
                text-align: center;
                margin-bottom: 10px;
            }

            /* Heading: use fluid clamped size */
            .text-8xl {
                font-size: clamp(2.4rem, 10vw, 3.2rem) !important;
                line-height: 0.88 !important;
                letter-spacing: -0.04em;
                margin-bottom: 10px;
            }

            /* Hide decorative icon row — wastes vertical space */
            .controls > div > .flex.gap-2.mb-8 { display: none; }

            /* Hide the inset list panel */
            .inset-list { display: none; }

            /* Button row: centered, horizontal, tight gap */
            .flex.items-start.gap-10 {
                justify-content: center;
                align-items: center;
                gap: 14px;
                margin-bottom: 14px;
            }

            .btn-circle {
                width: 50px;
                height: 50px;
                flex-shrink: 0;
            }
            .plus-btn { margin-bottom: 0; }

            /* Grid mask: show ALL services — no clipping on mobile */
            .grid-mask {
                width: 100%;
                height: auto !important;         /* expand to fit all cards */
                min-height: unset !important;
                max-height: none !important;
                overflow: visible !important;    /* no clip */
                mask-image: none !important;     /* no fade-out effect */
                -webkit-mask-image: none !important;
                margin: 0;
                padding: 0;
            }

            /* The JS-scrolled inner grid: reset transform and let it flow */
            .services-grid-inner {
                transform: none !important;      /* override any GSAP translateY */
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            /* Hide the + / − buttons — not needed when all cards are visible */
            #btn-plus, #btn-minus {
                display: none !important;
            }

            /* Also hide the button flex-col container */
            .flex.items-start.gap-10 .flex.flex-col {
                display: none !important;
            }

            /* Reset card-4 inline stagger transform — causes misalignment */
            #card-4 { transform: none !important; }

            .card {
                padding: 12px 10px;
                border-radius: 20px;
                aspect-ratio: 1 / 1;
            }

            .card-icon {
                font-size: 1.5rem;
                margin-bottom: 6px !important;
            }

            .service-label {
                font-size: 9px;
                letter-spacing: 0.12em;
            }
        }

        /* Extra-small phones (≤400px) */
        @media (max-width: 400px) {
            .main-container { padding: 64px 12px 72px; }

            .text-8xl {
                font-size: clamp(2.1rem, 9vw, 2.5rem) !important;
            }

            /* Still unlock the mask on tiny phones */
            .grid-mask {
                height: auto !important;
                min-height: unset !important;
                max-height: none !important;
                overflow: visible !important;
                mask-image: none !important;
                -webkit-mask-image: none !important;
            }

            .services-grid-inner { gap: 10px; }

            .card {
                padding: 10px 8px;
                border-radius: 16px;
            }

            .card-icon { font-size: 1.3rem; }
            .service-label { font-size: 8px; }

            .bg-brand { font-size: 80vw; opacity: 0.05; }
        }


    </style>
</head>

<body>

    <script>
        let scrollIndex = 0;
        const maxScroll = 2; // Fixed for current grid height

        function updateScroll() {
            const shift = scrollIndex * 240;
            gsap.to("#grid-inner", {
                y: -shift,
                duration: 1.2,
                ease: "expo.out"
            });

            // Update lines
            const lines = document.querySelectorAll('.line-fill');
            lines.forEach((line, i) => {
                if (i <= scrollIndex * 4 + 1) {
                    line.classList.add('active');
                } else {
                    line.classList.remove('active');
                }
            });
        }

        document.getElementById('btn-plus').addEventListener('click', () => {
            if (scrollIndex < maxScroll) {
                scrollIndex++;
                updateScroll();
                gsap.fromTo("#btn-plus", { scale: 0.9 }, { scale: 1, duration: 0.4, ease: "back.out(2)" });
            }
        });

        document.getElementById('btn-minus').addEventListener('click', () => {
            if (scrollIndex > 0) {
                scrollIndex--;
                updateScroll();
                gsap.fromTo("#btn-minus", { scale: 0.9 }, { scale: 1, duration: 0.4, ease: "back.out(2)" });
            }
        });

        // Handle Mouse Wheel for the Grid + Transition Trigger
        let lastScrollTime = 0;
        const scrollCooldown = 400; // ms

        window.addEventListener('wheel', (e) => {
            if (window.isAtBottomTransition) return;

            const now = Date.now();
            if (now - lastScrollTime < scrollCooldown) return;

            if (Math.abs(e.deltaY) < 10) return; // Ignore tiny movements

            if (e.deltaY > 0) { // Scroll Down
                if (scrollIndex < maxScroll) {
                    scrollIndex++;
                    updateScroll();
                    lastScrollTime = now;
                }
            } else if (e.deltaY < 0) { // Scroll Up
                if (scrollIndex > 0) {
                    scrollIndex--;
                    updateScroll();
                    lastScrollTime = now;
                }
            }
        }, { passive: true });

        // Mobile Touch Support for Grid
        let touchStartGridY = 0;
        window.addEventListener('touchstart', (e) => { touchStartGridY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchend', (e) => {
            const dy = touchStartGridY - e.changedTouches[0].clientY;
            if (Math.abs(dy) < 30) return; // Ignore taps

            if (dy > 30) { // Swipe Up (Next row)
                if (scrollIndex < maxScroll) {
                    scrollIndex++;
                    updateScroll();
                }
            } else if (dy < -30) { // Swipe Down (Prev row)
                if (scrollIndex > 0) {
                    scrollIndex--;
                    updateScroll();
                }
            }
        }, { passive: true });

        // Tell the transition engine we are at the bottom when scrollIndex reaches max
        function checkState() {
            window.isServicesAtBottom = (scrollIndex === maxScroll);
            window.isServicesAtTop = (scrollIndex === 0);
        }

        // Wrap updateScroll to check bottom state
        const originalUpdateScroll = updateScroll;
        updateScroll = function () {
            originalUpdateScroll();
            checkState();
        };
        checkState(); // Initial check

        // ─────────────────────────────────────────────────────────────────
        // MOBILE OVERRIDE: On phones, show all cards via natural page scroll.
        // Clear the isServicesAtBottom/Top overrides so page-transitions.js
        // uses real window scroll position for transition triggers.
        // ─────────────────────────────────────────────────────────────────
        (function applyMobileMode() {
            const isMobile = window.innerWidth <= 768;
            if (!isMobile) return;

            // Delete overrides — page-transitions.js falls back to native scroll
            delete window.isServicesAtBottom;
            delete window.isServicesAtTop;

            // Unlock the grid: reset any GSAP transform so all cards are visible
            const gridInner = document.getElementById('grid-inner');
            if (gridInner) gridInner.style.transform = 'none';

            // Block the touchend swipe handler from re-setting these overrides
            // by monkey-patching checkState to be a no-op on mobile
            updateScroll = function() { /* no-op on mobile — grid is static */ };
        })();
    </script>
    <!-- ── Cinematic Page Transition Engine ── -->
    <script src="assets/page-transitions.js"></script>
