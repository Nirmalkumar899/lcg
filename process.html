<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Process | LCG Digital Cinematheque</title>
    <link rel="icon" type="image/jpeg" href="https://wcnujolfbitmtrrelkhq.supabase.co/storage/v1/object/public/gif%20logo/IMG_7414.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        :root {
            /* DARK NEUMORPHIC THEME */
            --bg: #0e1012;
            --card-bg: #121417;
            --sh-dark: #000000;
            --sh-light: #1e2126;
            --neon: #daff3d; /* LCG Neon Lime */
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:var(--bg);
            font-family:'Poppins',sans-serif;
            height:100vh;overflow:hidden;
            color: #888;
            -webkit-font-smoothing:antialiased;
        }

        /* ═══ WATERMARK (NEON EMBOSSED) ═══ */
        .wm-container {
            position: fixed;
            left: 80px;
            top: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            z-index: 0;
            pointer-events: none;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap;
        }
        .wm-text {
            font-weight: 900;
            font-size: clamp(60px, 8vw, 110px);
            color: var(--neon); /* Neon color as requested */
            text-transform: uppercase;
            letter-spacing: -1px;
            /* Neon Glow effect */
            text-shadow: 
                0 0 10px rgba(218, 255, 61, 0.2),
                0 0 20px rgba(218, 255, 61, 0.1);
            opacity: 0.8; /* Slightly transparent for watermark feel */
        }

        /* ═══ TOP NAV ═══ */
        .tn{position:fixed;top:0;left:0;right:0;padding:26px 40px;display:flex;justify-content:space-between;align-items:center;z-index:50;}
        .tn a{font-size:11px;font-weight:700;letter-spacing:.1em;color:#666;text-decoration:none;display:flex;align-items:center;gap:7px;transition:color .3s;}
        .tn a:hover{color:var(--neon);}
        .tn .s{font-size:9px;font-weight:600;color:#444;letter-spacing:.14em;text-transform:uppercase;}

        /* ═══ LAYOUT ═══ */
        .pg{
            height:100vh;display:flex;align-items:center;justify-content:center;
            padding:0 50px 0 240px;
            gap:80px;position:relative;z-index:1;
        }

        /* ═══ MAIN CARD (DARK NEU) ═══ */
        .mc{
            width:560px;height:560px;flex-shrink:0;
            background:var(--card-bg);
            border-radius:48px;
            box-shadow:20px 20px 50px var(--sh-dark),-10px -10px 30px var(--sh-light);
            position:relative;overflow:hidden;
        }

        /* ═══ DIAL ═══ */
        .dial-wrap{
            position:absolute;
            top:50%;left:50%;
            transform:translate(-50%,-52%);
            width:420px;height:420px;
        }
        .dial{
            width:100%;height:100%;position:relative;
            transition:transform .7s cubic-bezier(.4,0,.2,1);
        }

        .dial-outer{
            position:absolute;inset:0;border-radius:50%;
            border:2px solid rgba(255,255,255,.02);
        }
        .dial-inner{
            position:absolute;inset:24px;border-radius:50%;
            background:linear-gradient(160deg,#16191d 0%,#0e1012 100%);
            box-shadow:inset 6px 6px 14px var(--sh-dark),inset -4px -4px 10px var(--sh-light);
        }

        /* center hub */
        .hub{
            position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);
            width:62px;height:62px;border-radius:50%;
            background:linear-gradient(145deg,#1c1f24,#121417);
            box-shadow:5px 5px 12px var(--sh-dark),-3px -3px 10px var(--sh-light);
            z-index:5;
        }
        .hub::after{
            content:'';position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);
            width:16px;height:16px;border-radius:50%;
            background:var(--neon); /* Neon point */
            box-shadow:0 0 15px var(--neon);
            opacity: 0.8;
        }

        /* ═══ TICK MARKS ═══ */
        .tm {position:absolute;inset:0;}
        .t {
            position:absolute;
            width:1px;
            background:rgba(255,255,255,.04);
            left:50%;
            transform-origin:bottom center;
        }
        .t.mj {width:2px;height:18px;background:rgba(255,255,255,.08);top:6px;}
        .t.md {width:1.5px;height:12px;background:rgba(255,255,255,.05);top:10px;}
        .t.mn {width:1px;height:8px;background:rgba(255,255,255,.03);top:14px;}

        /* ═══ TRIPLE-LINE DECO ═══ */
        .triple{
            position:absolute;
            display:flex;flex-direction:column;gap:5px;
            transform-origin:center center;
        }
        .triple span{
            display:block;width:30px;height:2.5px;
            background:rgba(255,255,255,.05);border-radius:1px;
        }

        /* ═══ SPOKE ═══ */
        .spoke{
            position:absolute;
            transition:opacity .5s,filter .5s;
        }
        .spoke.active{opacity:1;filter:blur(0);}
        .spoke.active .label {color: var(--neon); text-shadow: 0 0 10px rgba(218, 255, 61, 0.3);}
        .spoke.active .uline {background: var(--neon); box-shadow: 0 0 10px var(--neon);}
        
        .spoke.inactive{opacity:.12;filter:blur(2.5px);}
        .spoke .label{
            font-size:18px;font-weight:600;
            color:#555;letter-spacing:.1em;
            text-transform:uppercase;
            transition: color 0.4s;
        }
        .spoke .uline{
            width:32px;height:3px;
            background:rgba(255,255,255,.05);border-radius:2px;
            margin-top:8px;margin-left:auto;margin-right:auto;
            transition: background 0.4s;
        }

        /* ═══ CARD TEXT ═══ */
        .ct{
            position:absolute;bottom:40px;left:40px;right:90px;z-index:20;pointer-events:none;
        }
        .ct .d{
            font-size:14px;line-height:1.6;color:#777;font-weight:400;
            max-width:280px;margin-bottom:20px;
            transition:opacity .35s,transform .35s;
        }
        .ct .ic{display:flex;gap:12px;opacity:.1;}
        .ct .ic span{font-size:18px;}

        /* ═══ RIGHT SIDEBAR ═══ */
        .sb{display:flex;flex-direction:column;align-items:center;gap:28px;flex-shrink:0;width:240px;}
        .ic-card{
            background:var(--card-bg);border-radius:24px;
            box-shadow:12px 12px 28px var(--sh-dark),-6px -6px 20px var(--sh-light);
            padding:28px 22px;width:220px;text-align:center;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .ic-card h3{font-weight:700;font-size:18px;margin-bottom:10px;color:var(--neon); text-shadow: 0 0 15px rgba(218, 255, 61, 0.2);}
        .ic-card p{font-size:13px;color:#666;line-height:1.5;}

        /* dots */
        .dg{display:flex;gap:28px;}
        .dt{display:grid;grid-template-columns:repeat(3,6px);gap:6px;opacity:.03;}
        .dt span{width:6px;height:6px;border-radius:50%;background:#fff;}

        /* arrow buttons */
        .ab{
            width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:transform .2s cubic-bezier(.175,.885,.32,1.275),box-shadow .2s;
        }
        .au{
            background:linear-gradient(145deg,#1a1d21,#121417);
            box-shadow:8px 8px 20px var(--sh-dark),-4px -4px 15px var(--sh-light);
            color:#555;
        }
        .ad{
            background:linear-gradient(135deg, var(--neon), #b8d433);
            box-shadow: 0 0 20px rgba(218, 255, 61, 0.3);
            color:#000;
        }
        .ad:hover { box-shadow: 0 0 30px rgba(218, 255, 61, 0.5); }
        .ab .material-symbols-outlined{font-size:30px;}

        /* annotation */
        .an{display:flex;flex-direction:column;align-items:center;}
        .an svg{width:40px;height:64px;}
        .an span{font-family:'Caveat',cursive;font-size:18px;color:#444;line-height:1.2;}



        @media(max-width:1300px){
            .pg{padding:0 40px 0 240px; gap:40px;}
            .mc{width:500px;height:500px;}
            .dial-wrap{width:360px;height:360px;}
            .wm-text{font-size:80px;}
        }
    </style>
</head>
<body>

<div class="wm-container">
    <div class="wm-text">OUR</div>
    <div class="wm-text">PROCESS</div>
</div>



<div class="tn">
    <a href="index.html"><span class="material-symbols-outlined">west</span> BACK</a>
    <div class="s">Product &amp; Digital Design Studio — LCG</div>
</div>

<div class="pg">
        <div style="display:flex; flex-direction:column; gap:24px;">
            <!-- card text moved above -->
            <div style="pointer-events:none;">
                <div style="font-size:14px; line-height:1.6; color:#777; font-weight:400; max-width:320px; margin-bottom:20px; transition:opacity .35s, transform .35s;" id="desc">
                    Our agile 3-step process ensures speed and spontaneity. Ideas turn into results in no time.
                </div>
                <div style="display:flex; gap:12px; opacity:0.1;">
                    <span class="material-symbols-outlined" style="font-size:18px;">auto_fix_high</span>
                    <span class="material-symbols-outlined" style="font-size:18px;">construction</span>
                    <span class="material-symbols-outlined" style="font-size:18px;">cruelty_free</span>
                </div>
            </div>

            <div class="mc">
                <div class="dial-wrap">
                    <div class="dial" id="dial">
                        <div class="dial-outer"></div>
                        <div class="dial-inner"></div>
                        <div class="tm" id="ticks"></div>

                        <div class="triple" style="top:32px;left:50%;transform:translateX(-50%);">
                            <span></span><span></span><span></span>
                        </div>
                        <div class="triple" style="bottom:82px;left:78px;transform:rotate(-60deg);">
                            <span></span><span></span><span></span>
                        </div>
                        <div class="triple" style="bottom:82px;right:78px;transform:rotate(60deg);">
                            <span></span><span></span><span></span>
                        </div>

                        <div class="hub"></div>

                        <div class="spoke active" id="sp0" style="right:54px;top:50%;transform:translateY(-50%);">
                            <div class="label">Step 01</div>
                            <div class="uline"></div>
                        </div>
                        <div class="spoke inactive" id="sp1" style="left:54px;top:50%;transform:translateY(-50%);">
                            <div class="label">Step 02</div>
                            <div class="uline"></div>
                        </div>
                        <div class="spoke inactive" id="sp2" style="left:50%;bottom:44px;transform:translateX(-50%);">
                            <div class="label">Step 03</div>
                            <div class="uline"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <div class="sb">
        <div class="ic-card" id="icard">
            <h3 id="ititle">Subscribe</h3>
            <p id="idesc">Subscribe and get access to your personal Trello board.</p>
        </div>

        <div style="display:flex;align-items:start;gap:20px;">
            <div class="dg">
                <div class="dt"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
                <div class="dt"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
            </div>
            <div class="an">
                <svg viewBox="0 0 40 58" fill="none">
                    <path d="M5 5C12 16,33 20,35 50" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
                    <path d="M29 46L35 50L37 42" stroke="#333" stroke-width="1.8" stroke-linecap="round" fill="none" />
                </svg>
                <span>look<br>here</span>
            </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:18px;align-items:center;">
            <button class="ab au" id="bu"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">arrow_drop_up</span></button>
            <button class="ab ad" id="bd"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">arrow_drop_down</span></button>
        </div>

        <div class="dg">
            <div class="dt"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
            <div class="dt"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        </div>
    </div>
</div>

<script>
    (function () {
        const c = document.getElementById('ticks');
        const n = 60, r = 206;
        for (let i = 0; i < n; i++) {
            const a = (i / n) * 360;
            const rad = (a - 90) * Math.PI / 180;
            const x = Math.cos(rad) * r, y = Math.sin(rad) * r;
            const mj = i % 15 === 0, md = i % 5 === 0 && !mj;
            const d = document.createElement('div');
            d.className = 't ' + (mj ? 'mj' : md ? 'md' : 'mn');
            d.style.cssText = `left:calc(50% + ${x}px);top:calc(50% + ${y}px);transform:rotate(${a}deg);transform-origin:center top;`;
            c.appendChild(d);
        }
    })();

    const steps = [
        { d: 'Our agile 3-step process ensures speed and spontaneity. Ideas turn into results in no time.', t: 'Subscribe', p: 'Subscribe and get access to your personal Trello board.' },
        { d: 'Add unlimited design requests to your Trello board. One request at a Time!', t: 'Request', p: 'Add unlimited design requests to your Trello board. One request at a Time!' },
        { d: 'Receive your cinematic content within days. We revise until you are 100% satisfied.', t: 'Deliver', p: 'Receive premium cinematic content. Revisions included until you love it.' }
    ];

    let cur = 0;
    const dial = document.getElementById('dial');
    const desc = document.getElementById('desc');
    const it = document.getElementById('ititle');
    const id_ = document.getElementById('idesc');
    const sps = [document.getElementById('sp0'), document.getElementById('sp1'), document.getElementById('sp2')];

    function upd() {
        dial.style.transform = `rotate(${cur * 120}deg)`;
        sps.forEach((s, i) => { s.classList.toggle('active', i === cur); s.classList.toggle('inactive', i !== cur); });
        desc.style.opacity = '0'; desc.style.transform = 'translateY(10px)';
        setTimeout(() => {
            const s = steps[cur];
            desc.textContent = s.d; it.textContent = s.t; id_.textContent = s.p;
            desc.style.opacity = '1'; desc.style.transform = 'translateY(0)';
        }, 220);
    }
    upd();

    document.getElementById('bu').onclick = function () { if (cur > 0) { cur--; upd(); this.style.transform = 'scale(.85)'; setTimeout(() => this.style.transform = '', 150); } };
    document.getElementById('bd').onclick = function () { if (cur < 2) { cur++; upd(); this.style.transform = 'scale(.85)'; setTimeout(() => this.style.transform = '', 150); } };
    document.addEventListener('keydown', e => { if (e.key === 'ArrowUp') document.getElementById('bu').click(); if (e.key === 'ArrowDown') document.getElementById('bd').click(); });
</script>
</body>
</html>
